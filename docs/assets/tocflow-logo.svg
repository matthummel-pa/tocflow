<svg xmlns="http://www.w3.org/2000/svg" width="560" height="160" viewBox="0 0 560 160" role="img" aria-label="TOCflow logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a8a61"/>
      <stop offset="0.55" stop-color="#2f6f4e"/>
      <stop offset="1" stop-color="#245c40"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <rect x="16" y="20" width="120" height="120" rx="26" fill="url(#g)"/>
  <!-- outline lines with bullets, indented like a TOC -->
  <g fill="#ffffff">
    <circle cx="50" cy="50" r="6"/>
    <rect x="64" y="45" width="52" height="10" rx="5"/>
    <circle cx="64" cy="80" r="5" fill="#cdebda"/>
    <rect x="76" y="75" width="40" height="10" rx="5" fill="#dff3e8"/>
    <circle cx="64" cy="110" r="5" fill="#cdebda"/>
    <rect x="76" y="105" width="40" height="10" rx="5" fill="#dff3e8"/>
  </g>
  <!-- Wordmark -->
  <text x="160" y="98" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="62" font-weight="800" letter-spacing="-1.5" fill="#1b2a22">TOC<tspan fill="#2f6f4e">flow</tspan></text>
  <text x="162" y="126" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="15.5" letter-spacing="3" fill="#5b6470">WORDPRESS TABLE OF CONTENTS</text>
</svg>
