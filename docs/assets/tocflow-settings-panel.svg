<svg xmlns="http://www.w3.org/2000/svg" width="380" height="540" viewBox="0 0 380 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="TOCflow block settings panel in the WordPress editor">
  <rect width="380" height="540" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="379" height="539" fill="none" stroke="#e0e0e0"/>

  <!-- Tabs -->
  <text x="24" y="34" font-size="14" font-weight="600" fill="#1e1e1e">Post</text>
  <text x="70" y="34" font-size="14" font-weight="600" fill="#1e1e1e">Block</text>
  <rect x="62" y="44" width="42" height="2" fill="#1e1e1e"/>
  <line x1="0" y1="52" x2="380" y2="52" stroke="#e0e0e0"/>

  <!-- Block header -->
  <rect x="20" y="70" width="26" height="26" rx="4" fill="#1e1e1e"/>
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round">
    <line x1="27" y1="78" x2="29" y2="78"/><line x1="32" y1="78" x2="40" y2="78"/>
    <line x1="27" y1="83" x2="29" y2="83"/><line x1="32" y1="83" x2="40" y2="83"/>
    <line x1="27" y1="88" x2="29" y2="88"/><line x1="32" y1="88" x2="40" y2="88"/>
  </g>
  <text x="56" y="88" font-size="15" font-weight="600" fill="#1e1e1e">Table of Contents</text>
  <text x="20" y="116" font-size="12.5" fill="#757575">Automatically generate a clean,</text>
  <text x="20" y="134" font-size="12.5" fill="#757575">linked table of contents from your</text>
  <text x="20" y="152" font-size="12.5" fill="#757575">post&#8217;s headings.</text>

  <!-- Settings / Styles tab icons -->
  <line x1="0" y1="172" x2="380" y2="172" stroke="#f0f0f0"/>
  <circle cx="150" cy="192" r="9" fill="none" stroke="#1e1e1e" stroke-width="1.6"/>
  <circle cx="150" cy="192" r="3" fill="#1e1e1e"/>
  <rect x="142" y="206" width="16" height="2" fill="#1e1e1e"/>
  <circle cx="230" cy="192" r="9" fill="none" stroke="#9e9e9e" stroke-width="1.6"/>
  <path d="M230 183 a9 9 0 0 1 0 18 z" fill="#9e9e9e"/>
  <line x1="0" y1="220" x2="380" y2="220" stroke="#e0e0e0"/>

  <!-- Settings label -->
  <text x="20" y="248" font-size="13.5" font-weight="600" fill="#1e1e1e">Settings</text>

  <!-- Heading text field -->
  <text x="20" y="278" font-size="11" font-weight="600" letter-spacing="0.4" fill="#757575">HEADING TEXT</text>
  <rect x="20" y="288" width="340" height="38" rx="3" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.4"/>
  <text x="32" y="312" font-size="13.5" fill="#1e1e1e">On this page</text>

  <!-- Toggles -->
  <!-- Include H2 (on) -->
  <rect x="20" y="350" width="34" height="18" rx="9" fill="#3858e9"/>
  <circle cx="45" cy="359" r="7" fill="#ffffff"/>
  <text x="66" y="364" font-size="13.5" fill="#1e1e1e">Include H2 headings</text>
  <!-- Include H3 (on) -->
  <rect x="20" y="384" width="34" height="18" rx="9" fill="#3858e9"/>
  <circle cx="45" cy="393" r="7" fill="#ffffff"/>
  <text x="66" y="398" font-size="13.5" fill="#1e1e1e">Include H3 headings</text>
  <!-- Include H4 (on) -->
  <rect x="20" y="418" width="34" height="18" rx="9" fill="#3858e9"/>
  <circle cx="45" cy="427" r="7" fill="#ffffff"/>
  <text x="66" y="432" font-size="13.5" fill="#1e1e1e">Include H4 headings</text>
  <!-- Numbered list (off) -->
  <rect x="20" y="452" width="34" height="18" rx="9" fill="#1e1e1e"/>
  <circle cx="29" cy="461" r="7" fill="#ffffff"/>
  <text x="66" y="466" font-size="13.5" fill="#1e1e1e">Use a numbered list</text>

  <line x1="0" y1="498" x2="380" y2="498" stroke="#e0e0e0"/>
  <text x="20" y="522" font-size="13.5" fill="#1e1e1e">Advanced</text>
  <path d="M349 515 l6 6 l6 -6" fill="none" stroke="#1e1e1e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
